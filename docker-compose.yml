services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://sot:sotpass@db:5432/sotdb
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sotdb
      POSTGRES_USER: sot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sotpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sot -d sotdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
