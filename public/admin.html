<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LORD Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #aaaaaa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
      padding: 20px;
    }

    h1 {
      color: #ffff55;
      font-size: 20px;
      margin-bottom: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h2 {
      color: #ffff55;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }

    #gate {
      max-width: 400px;
      margin: 80px auto;
      background: #111;
      border: 1px solid #333;
      padding: 30px;
    }

    #gate h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #gate label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
    }

    #gate input[type="password"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #444;
      color: #ffff55;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 10px;
      margin-bottom: 14px;
      outline: none;
    }

    #gate input[type="password"]:focus {
      border-color: #ffff55;
    }

    #gate-error {
      color: #ff5555;
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    button {
      background: #1a1a1a;
      border: 1px solid #555;
      color: #ffff55;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover:not(:disabled) {
      background: #252525;
      border-color: #ffff55;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.danger {
      border-color: #aa3333;
      color: #ff5555;
    }

    button.danger:hover:not(:disabled) {
      background: #1f0f0f;
      border-color: #ff5555;
    }

    button.primary {
      border-color: #55aa55;
      color: #55ff55;
    }

    button.primary:hover:not(:disabled) {
      background: #0f1f0f;
      border-color: #55ff55;
    }

    #login-btn {
      width: 100%;
    }

    #dash {
      max-width: 1100px;
      margin: 0 auto;
    }

    .dash-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .dash-header span {
      color: #555;
      font-size: 12px;
    }

    #logout-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-color: #444;
      color: #888;
    }

    .section {
      background: #0f0f0f;
      border: 1px solid #252525;
      padding: 18px 20px;
      margin-bottom: 24px;
    }

    .section-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      color: #ffff55;
      border-bottom: 1px solid #333;
      padding: 5px 8px;
      font-weight: normal;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #141414;
    }

    tbody td {
      padding: 5px 8px;
      border-bottom: 1px solid #1a1a1a;
      vertical-align: middle;
    }

    .badge-dead {
      color: #ff5555;
      font-weight: bold;
    }

    .badge-alive {
      color: #55aa55;
    }

    .badge-incomplete {
      color: #888;
      font-style: italic;
    }

    .revive-btn {
      font-size: 11px;
      padding: 2px 8px;
    }

    .announce-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #announce-input {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #444;
      color: #aaa;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
    }

    #announce-input:focus {
      border-color: #ffff55;
    }

    .news-list {
      list-style: none;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }

    .news-list li {
      padding: 3px 0;
      border-bottom: 1px solid #161616;
      display: flex;
      gap: 10px;
    }

    .news-list .news-day {
      color: #555;
      min-width: 50px;
      flex-shrink: 0;
    }

    .news-list .news-msg {
      color: #aaa;
      word-break: break-word;
    }

    .mig-list {
      list-style: none;
      font-size: 13px;
      max-height: 200px;
      overflow-y: auto;
    }

    .mig-list li {
      padding: 3px 0;
      border-bottom: 1px solid #161616;
      display: flex;
      gap: 14px;
    }

    .mig-list .mig-name {
      color: #55ff55;
      min-width: 240px;
    }

    .mig-list .mig-date {
      color: #555;
    }

    .status-bar {
      font-size: 12px;
      color: #55ff55;
      min-height: 18px;
      margin-top: 8px;
    }

    .status-bar.error {
      color: #ff5555;
    }

    .loading {
      color: #555;
      font-style: italic;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>

<!-- Password gate -->
<div id="gate">
  <h1>LORD Admin</h1>
  <label for="pw-input">Admin Password</label>
  <input type="password" id="pw-input" placeholder="Enter password..." autocomplete="current-password">
  <div id="gate-error"></div>
  <button id="login-btn">Login</button>
</div>

<!-- Dashboard (hidden until authed) -->
<div id="dash" style="display:none">
  <div class="dash-header">
    <h1>LORD Admin Panel</h1>
    <div style="display:flex;align-items:center;gap:14px;">
      <span id="dash-subtitle">Legend of the Red Dragon</span>
      <button id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Players -->
  <div class="section">
    <h2>Players</h2>
    <div class="section-toolbar">
      <button id="refresh-players-btn">Refresh</button>
    </div>
    <div id="players-wrap">
      <span class="loading">Loading...</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="section">
    <h2>Actions</h2>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <button id="newday-btn" class="primary">Trigger New Day</button>
        <div class="status-bar" id="newday-status"></div>
      </div>
      <div>
        <div class="announce-row">
          <input type="text" id="announce-input" maxlength="80" placeholder="System announcement (max 80 chars)...">
          <button id="announce-btn">Post Announcement</button>
        </div>
        <div class="status-bar" id="announce-status"></div>
      </div>
    </div>
  </div>

  <!-- Recent News -->
  <div class="section">
    <h2>Recent News</h2>
    <div class="section-toolbar">
      <button id="refresh-news-btn">Refresh</button>
    </div>
    <div id="news-wrap">
      <span class="loading">Loading...</span>
    </div>
  </div>

  <!-- Migrations -->
  <div class="section">
    <h2>Migrations</h2>
    <div class="section-toolbar">
      <button id="refresh-mig-btn">Refresh</button>
    </div>
    <div id="mig-wrap">
      <span class="loading">Loading...</span>
    </div>
  </div>
</div>

<script>
  'use strict';

  const CLASS_NAMES = { 1: 'Death Knight', 2: 'Mystic', 3: 'Thief' };

  // ── Auth ──────────────────────────────────────────────────────────────────

  function getToken() {
    return sessionStorage.getItem('lord_admin_token') || '';
  }

  function setToken(t) {
    sessionStorage.setItem('lord_admin_token', t);
  }

  function clearToken() {
    sessionStorage.removeItem('lord_admin_token');
  }

  // ── API helpers ───────────────────────────────────────────────────────────

  async function api(method, path, body) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken(),
      },
    };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch('/api/admin' + path, opts);
    if (res.status === 401) {
      clearToken();
      showGate('Wrong password or session expired.');
      throw new Error('Unauthorized');
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  // ── Gate / Dashboard ──────────────────────────────────────────────────────

  const gateEl   = document.getElementById('gate');
  const dashEl   = document.getElementById('dash');
  const pwInput  = document.getElementById('pw-input');
  const loginBtn = document.getElementById('login-btn');
  const gateErr  = document.getElementById('gate-error');

  function showGate(errMsg) {
    gateEl.style.display = '';
    dashEl.style.display = 'none';
    gateErr.textContent = errMsg || '';
    pwInput.value = '';
    pwInput.focus();
  }

  function showDash() {
    gateEl.style.display = 'none';
    dashEl.style.display = '';
    loadPlayers();
    loadNews();
    loadMigrations();
  }

  async function tryLogin() {
    const pw = pwInput.value.trim();
    if (!pw) return;
    setToken(pw);
    try {
      await api('GET', '/players'); // probe
      showDash();
    } catch (e) {
      if (e.message === 'Unauthorized') {
        // showGate already called
      } else {
        gateErr.textContent = 'Connection error: ' + e.message;
        clearToken();
      }
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  document.getElementById('logout-btn').addEventListener('click', () => {
    clearToken();
    showGate();
  });

  // ── Players ───────────────────────────────────────────────────────────────

  async function loadPlayers() {
    const wrap = document.getElementById('players-wrap');
    wrap.innerHTML = '<span class="loading">Loading...</span>';
    try {
      const rows = await api('GET', '/players');
      if (!rows.length) {
        wrap.innerHTML = '<span class="loading">No players found.</span>';
        return;
      }
      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Handle</th>
            <th>Level</th>
            <th>Class</th>
            <th>EXP</th>
            <th>Gold</th>
            <th>Status</th>
            <th>Last Seen</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="players-tbody"></tbody>
      `;
      const tbody = table.querySelector('#players-tbody');
      for (const p of rows) {
        const tr = document.createElement('tr');
        const statusLabel = !p.setup_complete
          ? '<span class="badge-incomplete">Setup</span>'
          : p.dead
          ? '<span class="badge-dead">DEAD</span>'
          : '<span class="badge-alive">Alive</span>';
        const lastSeen = p.last_seen
          ? new Date(p.last_seen).toLocaleString()
          : '—';
        const cls = CLASS_NAMES[p.class] || ('Class ' + (p.class || '?'));
        const exp = p.exp != null ? Number(p.exp).toLocaleString() : '—';
        const gold = p.gold != null ? Number(p.gold).toLocaleString() : '—';
        tr.innerHTML = `
          <td>${p.id}</td>
          <td>${esc(p.username || '')}</td>
          <td>${esc(p.handle || '—')}</td>
          <td>${p.level || '—'}</td>
          <td>${esc(cls)}</td>
          <td>${exp}</td>
          <td>${gold}</td>
          <td>${statusLabel}</td>
          <td>${lastSeen}</td>
          <td><button class="revive-btn danger" data-id="${p.id}" ${p.dead || p.near_death ? '' : 'disabled'}>Revive</button></td>
        `;
        tbody.appendChild(tr);
      }
      wrap.innerHTML = '';
      wrap.appendChild(table);
      wrap.querySelectorAll('.revive-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          btn.disabled = true;
          btn.textContent = '...';
          try {
            await api('POST', '/reset-player', { id: Number(id) });
            await loadPlayers();
          } catch (e) {
            btn.disabled = false;
            btn.textContent = 'Revive';
            alert('Error: ' + e.message);
          }
        });
      });
    } catch (e) {
      if (e.message !== 'Unauthorized') {
        wrap.innerHTML = '<span class="loading" style="color:#ff5555">Error: ' + esc(e.message) + '</span>';
      }
    }
  }

  document.getElementById('refresh-players-btn').addEventListener('click', loadPlayers);

  // ── Actions ───────────────────────────────────────────────────────────────

  document.getElementById('newday-btn').addEventListener('click', async () => {
    const btn = document.getElementById('newday-btn');
    const status = document.getElementById('newday-status');
    if (!confirm('Trigger new day for ALL active players? This will reset daily limits and apply overnight effects.')) return;
    btn.disabled = true;
    status.className = 'status-bar';
    status.textContent = 'Running...';
    try {
      const res = await api('POST', '/new-day');
      status.textContent = 'Done. ' + res.playersUpdated + ' player(s) updated.';
      loadNews();
    } catch (e) {
      status.className = 'status-bar error';
      status.textContent = 'Error: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('announce-btn').addEventListener('click', async () => {
    const input = document.getElementById('announce-input');
    const btn = document.getElementById('announce-btn');
    const status = document.getElementById('announce-status');
    const msg = input.value.trim();
    if (!msg) {
      status.className = 'status-bar error';
      status.textContent = 'Message cannot be empty.';
      return;
    }
    btn.disabled = true;
    status.className = 'status-bar';
    status.textContent = 'Posting...';
    try {
      await api('POST', '/announce', { message: msg });
      status.textContent = 'Announcement posted.';
      input.value = '';
      loadNews();
    } catch (e) {
      status.className = 'status-bar error';
      status.textContent = 'Error: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('announce-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('announce-btn').click();
  });

  // ── News ──────────────────────────────────────────────────────────────────

  async function loadNews() {
    const wrap = document.getElementById('news-wrap');
    wrap.innerHTML = '<span class="loading">Loading...</span>';
    try {
      const rows = await api('GET', '/news');
      if (!rows.length) {
        wrap.innerHTML = '<span class="loading">No news entries.</span>';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'news-list';
      for (const n of rows) {
        const li = document.createElement('li');
        const dayStr = n.day != null ? 'Day ' + n.day : '—';
        li.innerHTML = `<span class="news-day">${esc(dayStr)}</span><span class="news-msg">${esc(stripColorCodes(n.message || ''))}</span>`;
        ul.appendChild(li);
      }
      wrap.innerHTML = '';
      wrap.appendChild(ul);
    } catch (e) {
      if (e.message !== 'Unauthorized') {
        wrap.innerHTML = '<span class="loading" style="color:#ff5555">Error: ' + esc(e.message) + '</span>';
      }
    }
  }

  document.getElementById('refresh-news-btn').addEventListener('click', loadNews);

  // ── Migrations ────────────────────────────────────────────────────────────

  async function loadMigrations() {
    const wrap = document.getElementById('mig-wrap');
    wrap.innerHTML = '<span class="loading">Loading...</span>';
    try {
      const rows = await api('GET', '/migrations');
      if (!rows.length) {
        wrap.innerHTML = '<span class="loading">No migrations found.</span>';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'mig-list';
      for (const m of rows) {
        const li = document.createElement('li');
        const appliedAt = m.applied_at
          ? new Date(m.applied_at).toLocaleString()
          : '—';
        li.innerHTML = `<span class="mig-name">${esc(m.name)}</span><span class="mig-date">${appliedAt}</span>`;
        ul.appendChild(li);
      }
      wrap.innerHTML = '';
      wrap.appendChild(ul);
    } catch (e) {
      if (e.message !== 'Unauthorized') {
        wrap.innerHTML = '<span class="loading" style="color:#ff5555">Error: ' + esc(e.message) + '</span>';
      }
    }
  }

  document.getElementById('refresh-mig-btn').addEventListener('click', loadMigrations);

  // ── Utilities ─────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Strip LORD backtick color codes for plain display
  function stripColorCodes(str) {
    return str.replace(/`[$%!0@#826]/g, '');
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  // Auto-login if a token is already in sessionStorage
  if (getToken()) {
    showDash();
  } else {
    pwInput.focus();
  }
</script>
</body>
</html>
